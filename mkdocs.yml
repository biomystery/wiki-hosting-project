# MkDocs config. `docs/` is generated by resolver/resolve_links.py from the
# Obsidian vault — never edit docs/ by hand, edit the vault and rebuild.
site_name: Wiki
docs_dir: docs

theme:
  name: material
  font: false   # no Google Fonts — keep the private site fully self-contained
  features:
    - navigation.sections   # type-based folders (people/, concepts/, ...) as sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.integrate

# nav is intentionally omitted: MkDocs auto-builds it from the folder
# structure, so swapping in a different vault needs no config change.
# index.md becomes the landing page automatically.

plugins:
  - search          # client-side full-text search (lunr), built at build time

markdown_extensions:
  - tables
  - toc:
      permalink: true

validation:
  links:
    not_found: warn
    unrecognized_links: warn

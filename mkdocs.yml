# MkDocs config. `docs/` is generated by resolver/resolve_links.py from the
# Obsidian vault — never edit docs/ by hand, edit the vault and rebuild.
site_name: !ENV [WIKI_SITE_NAME, "Wiki"]
docs_dir: docs

theme:
  name: material
  font: false   # no Google Fonts — Overpass Mono is self-hosted in theme/
  palette:
    primary: custom   # brand colors defined in theme/extra.css
    accent: custom
  features:
    # left nav folders are collapsible and collapsed by default (no
    # navigation.sections / navigation.expand); per-page TOC renders in the
    # right sidebar (no toc.integrate)
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow

# nav is intentionally omitted: MkDocs auto-builds it from the folder
# structure, so swapping in a different vault needs no config change.
# index.md becomes the landing page automatically.

plugins:
  - search          # client-side full-text search (lunr), built at build time

extra_css:
  - _theme/extra.css   # theme/ is copied to docs/_theme at build time

markdown_extensions:
  - tables
  - admonition            # Obsidian callouts arrive as !!! admonitions
  - pymdownx.details      # foldable callouts ([!type]- / [!type]+) as ???/???+
  - pymdownx.superfences  # code blocks inside admonitions
  - toc:
      permalink: true

validation:
  links:
    not_found: warn
    unrecognized_links: warn
